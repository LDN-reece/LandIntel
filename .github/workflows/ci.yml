name: LandIntel CI

on:
  push:
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/run-landintel.yml"
      - "Dockerfile"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/run-landintel.yml"
      - "Dockerfile"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: landintel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d landintel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/app
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/landintel_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev proj-bin postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Wait for PostGIS
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres -d landintel_test; do
            sleep 2
          done
        env:
          PGPASSWORD: postgres

      - name: Run migration smoke test
        run: python -m src.main run-migrations

      - name: Run CLI smoke checks
        run: python -m src.main --help

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
