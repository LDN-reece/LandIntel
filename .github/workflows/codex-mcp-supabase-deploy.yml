name: Codex MCP -> Supabase Deploy

on:
  workflow_run:
    workflows:
      - LandIntel CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: codex-mcp-supabase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/app
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Validate deployment configuration
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          case "$SUPABASE_DB_URL" in
            postgresql://*|postgresql+psycopg://*|postgres://*)
              echo "SUPABASE_DB_URL format looks valid"
              ;;
            https://*)
              echo "SUPABASE_DB_URL is wrong. Use the Postgres connection string from Supabase Connect, not the project URL."
              exit 1
              ;;
            *)
              echo "SUPABASE_DB_URL must start with postgresql://, postgresql+psycopg://, or postgres://"
              exit 1
              ;;
          esac

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev proj-bin postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run schema contract checks
        run: |
          python -m unittest \
            tests.test_live_audit_views_contract \
            tests.test_constraints_measurement_contract \
            -v

      - name: Compile migration runners
        run: |
          python -m py_compile \
            src/source_phase_runner.py \
            src/db.py \
            src/loaders/supabase_loader.py

      - name: Apply ordered SQL migrations to Supabase
        run: python -m src.source_phase_runner run-migrations

      - name: Run live audit smoke SQL against Supabase
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f sql_checks/live_audit_smoke.sql

      - name: Run constraints smoke SQL against Supabase
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f sql_checks/constraints_measurement_smoke.sql

      - name: Export schema audit snapshot
        run: |
          mkdir -p /tmp/landintel-schema-audit

          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -F $'\t' -At <<'SQL' > /tmp/landintel-schema-audit/constraints_objects.tsv
          select
              n.nspname || '.' || c.relname as object_name,
              case c.relkind
                  when 'r' then 'table'
                  when 'v' then 'view'
                  when 'm' then 'materialized_view'
                  else c.relkind::text
              end as object_type,
              coalesce(obj_description(c.oid, 'pg_class'), '') as object_comment
          from pg_class as c
          join pg_namespace as n
            on n.oid = c.relnamespace
          where (n.nspname, c.relname) in (
              ('public', 'site_spatial_links'),
              ('public', 'site_title_validation'),
              ('public', 'constraint_layer_registry'),
              ('public', 'constraint_source_features'),
              ('public', 'site_constraint_measurements'),
              ('public', 'site_constraint_group_summaries'),
              ('public', 'site_commercial_friction_facts'),
              ('public', 'site_constraints'),
              ('analytics', 'v_constraints_tab_overview'),
              ('analytics', 'v_constraints_tab_measurements'),
              ('analytics', 'v_constraints_tab_group_summaries'),
              ('analytics', 'v_constraints_tab_commercial_friction')
          )
          order by 1;
          SQL

          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -F $'\t' -At <<'SQL' > /tmp/landintel-schema-audit/constraints_columns.tsv
          select
              table_schema,
              table_name,
              ordinal_position,
              column_name,
              data_type
          from information_schema.columns
          where (table_schema, table_name) in (
              ('public', 'site_spatial_links'),
              ('public', 'site_title_validation'),
              ('public', 'constraint_layer_registry'),
              ('public', 'constraint_source_features'),
              ('public', 'site_constraint_measurements'),
              ('public', 'site_constraint_group_summaries'),
              ('public', 'site_commercial_friction_facts'),
              ('analytics', 'v_constraints_tab_overview'),
              ('analytics', 'v_constraints_tab_measurements'),
              ('analytics', 'v_constraints_tab_group_summaries'),
              ('analytics', 'v_constraints_tab_commercial_friction')
          )
          order by table_schema, table_name, ordinal_position;
          SQL

      - name: Upload schema audit snapshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: landintel-supabase-schema-audit
          path: /tmp/landintel-schema-audit
          if-no-files-found: error
