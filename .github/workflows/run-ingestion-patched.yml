name: Run LandIntel Ingestion Patched

on:
  workflow_dispatch:
    inputs:
      command:
        description: Which step to run on GitHub
        required: true
        type: choice
        default: discover-sources
        options:
          - discover-sources
          - load-boundaries
          - ingest-ros-cadastral
          - full-refresh

concurrency:
  group: landintel-ingestion-patched
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOUNDARY_AUTHKEY: ${{ secrets.BOUNDARY_AUTHKEY }}
      BOUNDARY_GEOJSON_URL: ${{ secrets.BOUNDARY_GEOJSON_URL }}
      ROS_CLIENT_ID: ${{ secrets.ROS_CLIENT_ID }}
      ROS_CLIENT_SECRET: ${{ secrets.ROS_CLIENT_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          case "$SUPABASE_DB_URL" in
            postgresql://*|postgresql+psycopg://*|postgres://*)
              echo "SUPABASE_DB_URL format looks valid"
              ;;
            https://*)
              echo "SUPABASE_DB_URL is wrong. Use the Postgres connection string from Supabase Connect, not the project URL."
              exit 1
              ;;
            *)
              echo "SUPABASE_DB_URL must start with postgresql://, postgresql+psycopg://, or postgres://"
              exit 1
              ;;
          esac

      - name: Patch acreage split and nullable geometry SQL
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'lambda value: "bucket_1_under_5_acres" if float(value) < 5 else "bucket_2_5plus_acres"': 'lambda value: "bucket_1_under_4_acres" if float(value) < 4 else "bucket_2_4plus_acres"',
              'lambda value: "Under 5 acres" if float(value) < 5 else "5+ acres"': 'lambda value: "Under 4 acres" if float(value) < 4 else "4+ acres"',
              "when coalesce(area_acres, 0) < 5 then 'bucket_1_under_5_acres'": "when coalesce(area_acres, 0) < 4 then 'bucket_1_under_4_acres'",
              "else 'bucket_2_5plus_acres'": "else 'bucket_2_4plus_acres'",
              "when coalesce(area_acres, 0) < 5 then 'Under 5 acres'": "when coalesce(area_acres, 0) < 4 then 'Under 4 acres'",
              "else '5+ acres'": "else '4+ acres'",
              '''                case
                    when :geographic_extent_wkb is null then null
                    else ST_Multi(ST_GeomFromWKB(decode(:geographic_extent_wkb, 'hex'), 4326))
                end,''': '''                case
                    when cast(:geographic_extent_wkb as text) is null then null::geometry(multipolygon, 4326)
                    else ST_Multi(ST_GeomFromWKB(decode(cast(:geographic_extent_wkb as text), 'hex'), 4326))
                end,''',
              '''                case
                    when :geometry_simplified_wkb is null then null
                    else ST_Multi(ST_GeomFromWKB(decode(:geometry_simplified_wkb, 'hex'), 27700))
                end''': '''                case
                    when cast(:geometry_simplified_wkb as text) is null then null::geometry(multipolygon, 27700)
                    else ST_Multi(ST_GeomFromWKB(decode(cast(:geometry_simplified_wkb as text), 'hex'), 27700))
                end''',
              '''                case
                    when :geometry_wkb is null then null
                    else ST_Multi(ST_GeomFromWKB(decode(:geometry_wkb, 'hex'), 27700))
                end''': '''                case
                    when cast(:geometry_wkb as text) is null then null::geometry(multipolygon, 27700)
                    else ST_Multi(ST_GeomFromWKB(decode(cast(:geometry_wkb as text), 'hex'), 27700))
                end''',
              '''                case
                    when :centroid_wkb is null then null
                    else ST_GeomFromWKB(decode(:centroid_wkb, 'hex'), 27700)
                end,''': '''                case
                    when cast(:centroid_wkb as text) is null then null::geometry(point, 27700)
                    else ST_GeomFromWKB(decode(cast(:centroid_wkb as text), 'hex'), 27700)
                end,''',
          }

          for rel_path in [
              Path('app/src/processors/classify_size.py'),
              Path('app/sql/005_functions.sql'),
              Path('app/src/loaders/supabase_loader.py'),
          ]:
              text = rel_path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  text = text.replace(old, new)
              rel_path.write_text(text, encoding='utf-8')
          PY

      - name: Build worker image
        run: docker build -t landintel-worker .

      - name: Run selected ingestion step
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            -e BOUNDARY_AUTHKEY \
            -e BOUNDARY_GEOJSON_URL \
            -e ROS_CLIENT_ID \
            -e ROS_CLIENT_SECRET \
            landintel-worker \
            python -m src.main "${{ inputs.command }}"
