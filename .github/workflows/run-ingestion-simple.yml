name: Run LandIntel Ingestion Simple

on:
  workflow_dispatch:
    inputs:
      command:
        description: Which step to run on GitHub
        required: true
        type: choice
        default: discover-sources
        options:
          - discover-sources
          - load-boundaries
          - ingest-ros-cadastral
          - full-refresh

concurrency:
  group: landintel-ingestion-simple
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOUNDARY_AUTHKEY: ${{ secrets.BOUNDARY_AUTHKEY }}
      BOUNDARY_GEOJSON_URL: ${{ secrets.BOUNDARY_GEOJSON_URL }}
      ROS_CLIENT_ID: ${{ secrets.ROS_CLIENT_ID }}
      ROS_CLIENT_SECRET: ${{ secrets.ROS_CLIENT_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Force 4 acre site split
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'lambda value: "bucket_1_under_5_acres" if float(value) < 5 else "bucket_2_5plus_acres"': 'lambda value: "bucket_1_under_4_acres" if float(value) < 4 else "bucket_2_4plus_acres"',
              'lambda value: "Under 5 acres" if float(value) < 5 else "5+ acres"': 'lambda value: "Under 4 acres" if float(value) < 4 else "4+ acres"',
              "when coalesce(area_acres, 0) < 5 then 'bucket_1_under_5_acres'": "when coalesce(area_acres, 0) < 4 then 'bucket_1_under_4_acres'",
              "else 'bucket_2_5plus_acres'": "else 'bucket_2_4plus_acres'",
              "when coalesce(area_acres, 0) < 5 then 'Under 5 acres'": "when coalesce(area_acres, 0) < 4 then 'Under 4 acres'",
              "else '5+ acres'": "else '4+ acres'",
          }

          for rel_path in [
              Path('app/src/processors/classify_size.py'),
              Path('app/sql/005_functions.sql'),
          ]:
              text = rel_path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  text = text.replace(old, new)
              rel_path.write_text(text, encoding='utf-8')
          PY

      - name: Build worker image
        run: docker build -t landintel-worker .

      - name: Run selected ingestion step
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            -e BOUNDARY_AUTHKEY \
            -e BOUNDARY_GEOJSON_URL \
            -e ROS_CLIENT_ID \
            -e ROS_CLIENT_SECRET \
            landintel-worker \
            python -m src.main "${{ inputs.command }}"
