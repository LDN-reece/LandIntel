name: Run LandIntel Lean (Retired)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Retired workflow. Use Run LandIntel Sources for Phase One.
        required: true
        type: choice
        default: retired-use-run-landintel-sources
        options:
          - retired-use-run-landintel-sources

# Phase One execution lock:
# - This legacy lean workflow is retained only as an audit marker.
# - It performs no Supabase writes and loads no local/runtime source data.
# - All live source orchestration must run through Run LandIntel Sources.

concurrency:
  group: landintel-lean-retired
  cancel-in-progress: false

jobs:
  retired:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Retired workflow notice
        run: |
          echo "Run LandIntel Lean is retired for Phase One."
          echo "No Supabase secrets are loaded here."
          echo "No Supabase writes are performed here."
          echo "Use the Run LandIntel Sources workflow for Phase One source orchestration."
