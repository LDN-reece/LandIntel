name: Run LandIntel Lean

on:
  workflow_dispatch:
    inputs:
      command:
        description: Lean GitHub-first stage to run
        required: true
        type: choice
        default: audit-operational-footprint
        options:
          - audit-operational-footprint
          - cleanup-operational-footprint
          - ingest-ros-cadastral-lean
          - full-refresh-lean
      arguments:
        description: Optional extra CLI arguments, for example --min-area-acres 4
        required: false
        type: string
        default: ""
      audit_backend:
        description: Whether to retain selected source artifacts in Supabase Storage
        required: true
        type: choice
        default: none
        options:
          - none
          - supabase

concurrency:
  group: landintel-lean-${{ inputs.command }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/app
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOUNDARY_AUTHKEY: ${{ secrets.BOUNDARY_AUTHKEY }}
      BOUNDARY_GEOJSON_URL: ${{ secrets.BOUNDARY_GEOJSON_URL }}
      ROS_CLIENT_ID: ${{ secrets.ROS_CLIENT_ID }}
      ROS_CLIENT_SECRET: ${{ secrets.ROS_CLIENT_SECRET }}
      AUDIT_ARTIFACT_BACKEND: ${{ inputs.audit_backend }}
      MIN_OPERATIONAL_AREA_ACRES: "4"
      MIRROR_LAND_OBJECTS: "false"
      PERSIST_STAGING_ROWS: "false"
      STAGING_RETENTION_DAYS: "14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Validate workflow configuration
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          case "$SUPABASE_DB_URL" in
            postgresql://*|postgresql+psycopg://*|postgres://*)
              echo "SUPABASE_DB_URL format looks valid"
              ;;
            https://*)
              echo "SUPABASE_DB_URL is wrong. Use the Postgres connection string from Supabase Connect, not the project URL."
              exit 1
              ;;
            *)
              echo "SUPABASE_DB_URL must start with postgresql://, postgresql+psycopg://, or postgres://"
              exit 1
              ;;
          esac

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev proj-bin postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run regression checks
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Compile critical runners
        run: python -m py_compile src/source_phase_runner.py src/source_catalog_sync.py

      - name: Show selected command
        run: |
          echo "Command: ${{ inputs.command }}"
          echo "Arguments: ${{ inputs.arguments }}"
          echo "Audit backend: $AUDIT_ARTIFACT_BACKEND"
          echo "Minimum operational area acres: $MIN_OPERATIONAL_AREA_ACRES"
          echo "Mirror land objects: $MIRROR_LAND_OBJECTS"

      - name: Run selected lean stage
        run: |
          set -euo pipefail
          EXTRA_ARGS="${{ inputs.arguments }}"
          python -m src.lean_ops "${{ inputs.command }}" ${EXTRA_ARGS}
