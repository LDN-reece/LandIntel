name: Run LandIntel Sources

on:
  workflow_dispatch:
    inputs:
      command:
        description: Which source phase command to run on GitHub
        required: true
        type: choice
        default: audit-source-footprint
        options:
          - run-migrations
          - sync-source-catalog
          - audit-source-footprint
          - ingest-planning-history
          - ingest-hla
          - process-reconcile-queue
          - reconcile-catchup-scan
          - refresh-affected-sites
          - weekly-reconcile-maintenance
          - full-reconcile-canonical-sites
          - ingest-bgs
          - full-refresh-core-sources
      source_file_url:
        description: Optional direct-download link for a source file or ZIP package. Upload it to Google Drive or another file host and paste the link here.
        required: false
        type: string
        default: ""
      source_file_name:
        description: Optional file name override. Recommended when using Google Drive links so the workflow keeps the right file extension.
        required: false
        type: string
        default: ""

# Automated schedules are intentionally paused during incremental reconcile burn-in.
# Resume hourly and weekly pulses only after the full manual workflow set is proven.

concurrency:
  group: landintel-sources-${{ github.event_name }}-${{ github.event.inputs.command || github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/app
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOUNDARY_AUTHKEY: ${{ secrets.BOUNDARY_AUTHKEY }}
      BOUNDARY_GEOJSON_URL: ${{ secrets.BOUNDARY_GEOJSON_URL }}
      OS_API_KEY: ${{ secrets.OS_API_KEY }}
      ROS_CLIENT_ID: ${{ secrets.ROS_CLIENT_ID }}
      ROS_CLIENT_SECRET: ${{ secrets.ROS_CLIENT_SECRET }}
      AUDIT_ARTIFACT_BACKEND: none
      PERSIST_STAGING_ROWS: "false"
      MIN_OPERATIONAL_AREA_ACRES: "4"
      PLANNING_NEW_SITE_MIN_AREA_ACRES: "4"
      RECONCILE_QUEUE_BATCH_LIMIT: "500"
      RECONCILE_REFRESH_BATCH_LIMIT: "250"
      RECONCILE_RUNTIME_MINUTES: "45"
      RECONCILE_LEASE_SECONDS: "1800"
      RECONCILE_REFRESH_LEASE_SECONDS: "1200"
      RECONCILE_MAX_ATTEMPTS: "3"
      MIRROR_LAND_OBJECTS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Validate workflow configuration
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          if [ -z "$BOUNDARY_AUTHKEY" ]; then
            echo "Missing GitHub secret: BOUNDARY_AUTHKEY"
            exit 1
          fi

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev proj-bin postgresql-client unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download workflow source file
        if: ${{ inputs.source_file_url != '' }}
        env:
          SOURCE_FILE_URL: ${{ inputs.source_file_url }}
          SOURCE_FILE_NAME: ${{ inputs.source_file_name }}
        run: |
          set -euo pipefail
          INPUT_ROOT="${RUNNER_TEMP}/workflow-source"
          DOWNLOAD_DIR="${INPUT_ROOT}/download"
          EXTRACTED_DIR="${INPUT_ROOT}/extracted"
          mkdir -p "$DOWNLOAD_DIR" "$EXTRACTED_DIR"

          RESOLVED_NAME="$SOURCE_FILE_NAME"
          if [ -z "$RESOLVED_NAME" ]; then
            RESOLVED_NAME="$(python -c 'import os; from urllib.parse import unquote, urlparse; url = os.environ["SOURCE_FILE_URL"]; path = unquote(urlparse(url).path.rstrip("/")); name = os.path.basename(path); print(name or "workflow-source-input")')"
          fi

          SOURCE_PATH="${DOWNLOAD_DIR}/${RESOLVED_NAME}"

          case "$SOURCE_FILE_URL" in
            *drive.google.com/*|*docs.google.com/*)
              python -m pip install gdown
              python -m gdown --fuzzy "$SOURCE_FILE_URL" -O "$SOURCE_PATH"
              ;;
            *)
              curl --fail --location --output "$SOURCE_PATH" "$SOURCE_FILE_URL"
              ;;
          esac

          if [ ! -s "$SOURCE_PATH" ]; then
            echo "Downloaded source file is empty"
            exit 1
          fi

          echo "LANDINTEL_SOURCE_INPUT_PATH=$SOURCE_PATH" >> "$GITHUB_ENV"
          echo "LANDINTEL_SOURCE_INPUT_DIR=$DOWNLOAD_DIR" >> "$GITHUB_ENV"
          echo "LANDINTEL_SOURCE_INPUT_FILENAME=$RESOLVED_NAME" >> "$GITHUB_ENV"

          if [[ "$SOURCE_PATH" == *.zip ]]; then
            unzip -o "$SOURCE_PATH" -d "$EXTRACTED_DIR" >/dev/null
            echo "LANDINTEL_SOURCE_INPUT_EXTRACTED_DIR=$EXTRACTED_DIR" >> "$GITHUB_ENV"
          fi

      - name: Run regression checks
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Compile critical runners
        run: python -m py_compile src/source_phase_runner.py src/source_catalog_sync.py src/source_reconcile_incremental.py src/source_reconcile_catchup.py src/source_reconcile_audit.py

      - name: Resolve selected command
        run: |
          set -euo pipefail
          selected_command="${{ inputs.command }}"
          echo "SELECTED_COMMAND=${selected_command}" >> "$GITHUB_ENV"

      - name: Show selected command
        run: |
          echo "Command: ${SELECTED_COMMAND}"
          echo "Source file URL provided: ${{ inputs.source_file_url != '' }}"
          echo "Source file name override provided: ${{ inputs.source_file_name != '' }}"

      - name: Run source phase command
        run: |
          set -euo pipefail

          run_with_retries() {
            local max_attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            while true; do
              echo "Running: $* (attempt ${attempt}/${max_attempts})"
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts"
                return 1
              fi
              echo "Command failed. Retrying in ${delay_seconds} seconds..."
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
            done
          }

          if [ "$SELECTED_COMMAND" = "sync-source-catalog" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_catalog_sync sync-source-catalog
          elif [ "$SELECTED_COMMAND" = "run-migrations" ]; then
            python -m src.source_phase_runner run-migrations
          elif [ "$SELECTED_COMMAND" = "audit-source-footprint" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_audit audit-source-footprint
          elif [ "$SELECTED_COMMAND" = "process-reconcile-queue" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental process-reconcile-queue --limit 50000
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "reconcile-catchup-scan" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_catchup reconcile-catchup-scan
          elif [ "$SELECTED_COMMAND" = "refresh-affected-sites" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "weekly-reconcile-maintenance" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental weekly-reconcile-maintenance
          elif [ "$SELECTED_COMMAND" = "full-reconcile-canonical-sites" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner reconcile-canonical-sites
          elif [ "$SELECTED_COMMAND" = "ingest-planning-history" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner ingest-planning-history
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family planning
            python -m src.source_reconcile_incremental process-reconcile-queue --limit 50000
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "ingest-hla" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner ingest-hla
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family hla
            python -m src.source_reconcile_incremental process-reconcile-queue --limit 50000
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "ingest-bgs" ]; then
            python -m src.source_phase_runner run-migrations
            run_with_retries 3 30 python -m src.source_phase_runner ingest-bgs
          else
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner "$SELECTED_COMMAND"
          fi
