name: Run LandIntel Sources

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/run-landintel-sources.yml"
      - "app/config/phase_one_source_estate.yaml"
      - "app/config/**"
      - "app/docs/**"
      - "app/sql/**"
      - "app/sql_checks/**"
      - "app/src/**"
      - "app/tests/**"
  workflow_dispatch:
    inputs:
      command:
        description: Which Phase One source command to run on GitHub
        required: true
        type: choice
        default: audit-source-footprint
        options:
          - run-migrations
          - sync-source-catalog
          - audit-source-footprint
          - audit-source-freshness
          - source-estate-maintenance
          - register-source-estate
          - probe-source-estate
          - audit-source-estate
          - audit-source-expansion
          - ingest-ros-cadastral
          - link-sites-to-ros-parcels
          - audit-site-parcel-links
          - resolve-title-numbers
          - audit-title-number-control
          - measure-constraints
          - measure-constraints-debug-all-layers
          - audit-constraint-measurements
          - discover-phase2-sources
          - ingest-planning-appeals
          - ingest-power-infrastructure
          - ingest-amenities
          - ingest-demographics
          - ingest-market-context
          - ingest-planning-documents
          - ingest-intelligence-events
          - ingest-companies-house
          - ingest-fca-entities
          - refresh-title-reviews
          - refresh-planning-decisions
          - audit-planning-decisions
          - refresh-title-readiness
          - refresh-site-market-context
          - refresh-site-amenity-context
          - refresh-site-demographic-context
          - refresh-site-power-context
          - refresh-site-abnormal-risk
          - refresh-site-assessments
          - audit-full-source-estate
          - discover-ldp-sources
          - discover-settlement-sources
          - ingest-ldp
          - ingest-settlement-boundaries
          - publish-planning-links
          - ingest-planning-history
          - full-ingest-planning-history
          - ingest-hla
          - ingest-ela
          - ingest-vdl
          - ingest-sepa-flood
          - ingest-coal-authority
          - ingest-hes-designations
          - ingest-naturescot
          - ingest-contaminated-land
          - ingest-tpo
          - ingest-culverts
          - ingest-conservation-areas
          - ingest-greenbelt
          - ingest-os-topography
          - ingest-os-places
          - ingest-os-features
          - ingest-os-linked-identifiers
          - ingest-os-openmap-local
          - ingest-os-open-roads
          - ingest-os-open-rivers
          - ingest-os-boundary-line
          - ingest-os-open-names
          - ingest-os-open-greenspace
          - ingest-os-open-zoomstack
          - ingest-os-open-toid
          - ingest-os-open-built-up-areas
          - ingest-os-open-uprn
          - ingest-os-open-usrn
          - ingest-osm-overpass
          - ingest-open-location-spine
          - ingest-naptan
          - ingest-statistics-gov-scot
          - ingest-opentopography-srtm
          - probe-open-location-spine
          - process-reconcile-queue
          - reconcile-catchup-scan
          - refresh-affected-sites
          - weekly-reconcile-maintenance
          - ingest-bgs
      constraint_measure_site_batch_size:
        description: Site batch size for measure-constraints runs
        required: false
        default: "25"
      constraint_measure_max_batches:
        description: Maximum batches for measure-constraints runs; use 0 only for an intentional full sweep
        required: false
        default: "4"
      constraint_measure_runtime_minutes:
        description: Runtime budget for measure-constraints runs
        required: false
        default: "10"
      constraint_measure_source_family:
        description: Optional constraint source family filter, for example sepa_flood, tpo, conservation_areas
        required: false
        default: ""
      constraint_measure_layer_key:
        description: Optional exact constraint layer_key filter for targeted measurement
        required: false
        default: ""
      constraint_measure_authority:
        description: Optional authority_name filter for targeted measurement
        required: false
        default: ""
      constraint_measure_debug_feature_probe_limit:
        description: Feature probe cap for measure-constraints-debug-all-layers
        required: false
        default: "50"
      phase2_source_family:
        description: Optional Phase 2 source family, module key or source key filter
        required: false
        default: ""
      phase2_authority:
        description: Optional Phase 2 authority/geography filter where relevant
        required: false
        default: ""
      phase2_batch_size:
        description: Phase 2 batch size for targeted refresh commands
        required: false
        default: "250"
      phase2_runtime_minutes:
        description: Phase 2 runtime budget for source commands
        required: false
        default: "10"
      phase2_dry_run:
        description: Run Phase 2 command without database mutations
        required: false
        type: boolean
        default: false
      phase2_force_refresh:
        description: Force Phase 2 refresh where command supports it
        required: false
        type: boolean
        default: false
      phase2_audit_only:
        description: Audit Phase 2 estate without registering or refreshing rows
        required: false
        type: boolean
        default: false

concurrency:
  group: "landintel-sources-${{ github.ref }}"
  cancel-in-progress: false

# Automated schedules are intentionally paused during incremental reconcile burn-in.
# Push runs are validation-only. Source-estate maintenance is manual-only during
# burn-in because it registers, probes, discovers, and audits sources. It keeps
# LDP storage licence-gated and settlement storage interpreter-gated
# until the canonical boundary-position overlay is promoted.
# Phase One orchestration is GitHub Actions + Supabase only; legacy full-refresh
# commands are deliberately not exposed as dispatch options.
# HLA is supporting evidence only; the source universe now expands through
# Title Number, LDP, settlement, constraints, ELA, VDL and OS commands instead
# of repeating HLA.

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/app
      SUPABASE_URL: https://icmgcxujqoiyzxqonwca.supabase.co
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BOUNDARY_AUTHKEY: ${{ secrets.BOUNDARY_AUTHKEY }}
      IMPROVEMENT_SERVICE_AUTHKEY: ${{ secrets.IMPROVEMENT_SERVICE_AUTHKEY }}
      BOUNDARY_GEOJSON_URL: ${{ secrets.BOUNDARY_GEOJSON_URL }}
      OS_PROJECT_API: ${{ secrets.OS_PROJECT_API || secrets.OS_API_KEY }}
      OS_PROJECT_API_SECRET: ${{ secrets.OS_PROJECT_API_SECRET }}
      OS_API_KEY: ${{ secrets.OS_PROJECT_API || secrets.OS_API_KEY }}
      OS_PLACES_API: ${{ secrets.OS_PLACES_API }}
      OS_PLACES_API_KEY: ${{ secrets.OS_PLACES_API_KEY }}
      OS_DOWNLOADS_API: ${{ secrets.OS_DOWNLOADS_API }}
      OS_FEATURES_API: ${{ secrets.OS_FEATURES_API }}
      OS_LINKED_IDENTIFIERS_API: ${{ secrets.OS_LINKED_IDENTIFIERS_API }}
      OPENTOPOGRAPHY_API_KEY: ${{ secrets.OPENTOPOGRAPHY_API_KEY }}
      COMPANIES_HOUSE_API: ${{ secrets.COMPANIES_HOUSE_API }}
      COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
      FCA_API: ${{ secrets.FCA_API }}
      FCA_API_KEY: ${{ secrets.FCA_API_KEY }}
      ROS_CLIENT_ID: ${{ secrets.ROS_CLIENT_ID }}
      ROS_CLIENT_SECRET: ${{ secrets.ROS_CLIENT_SECRET }}
      AUDIT_ARTIFACT_BACKEND: none
      PERSIST_STAGING_ROWS: "false"
      MIN_OPERATIONAL_AREA_ACRES: "4"
      PLANNING_NEW_SITE_MIN_AREA_ACRES: "4"
      RECONCILE_QUEUE_BATCH_LIMIT: "500"
      RECONCILE_REFRESH_BATCH_LIMIT: "250"
      RECONCILE_RUNTIME_MINUTES: "45"
      RECONCILE_LEASE_SECONDS: "1800"
      RECONCILE_REFRESH_LEASE_SECONDS: "1200"
      RECONCILE_MAX_ATTEMPTS: "3"
      SOURCE_EXPANSION_COMMAND_TIMEOUT: "45m"
      SOURCE_EXPANSION_PAGE_SIZE: "2000"
      SOURCE_EXPANSION_MAX_FEATURES: "0"
      SOURCE_EXPANSION_LDP_MAX_RESOURCES: "0"
      SOURCE_EXPANSION_LDP_MAX_LAYERS_PER_RESOURCE: "0"
      SOURCE_EXPANSION_ARCGIS_MAX_TILES: "75"
      SOURCE_EXPANSION_ARCGIS_MAX_FEATURES_PER_LAYER: "10000"
      SOURCE_EXPANSION_CONSTRAINT_MEASURE_MODE: "auto"
      SOURCE_EXPANSION_MAX_MEASURE_FEATURES: "2500"
      SOURCE_EXPANSION_MAX_MEASURE_LAYERS: "1"
      CONSTRAINT_MEASURE_SITE_BATCH_SIZE: ${{ inputs.constraint_measure_site_batch_size || '25' }}
      CONSTRAINT_MEASURE_MAX_BATCHES: ${{ inputs.constraint_measure_max_batches || '4' }}
      CONSTRAINT_MEASURE_MAX_BATCHES_PER_LAYER: "1"
      CONSTRAINT_MEASURE_MAX_LAYERS_PER_RUN: "1"
      CONSTRAINT_MEASURE_RUNTIME_MINUTES: ${{ inputs.constraint_measure_runtime_minutes || '10' }}
      CONSTRAINT_MEASURE_MIN_AREA_ACRES: "0"
      CONSTRAINT_MEASURE_SOURCE_FAMILY: ${{ inputs.constraint_measure_source_family || '' }}
      CONSTRAINT_MEASURE_LAYER_KEY: ${{ inputs.constraint_measure_layer_key || '' }}
      CONSTRAINT_MEASURE_AUTHORITY: ${{ inputs.constraint_measure_authority || '' }}
      CONSTRAINT_MEASURE_DEBUG_SITE_COUNT: ${{ inputs.constraint_measure_site_batch_size || '25' }}
      CONSTRAINT_MEASURE_DEBUG_FEATURE_PROBE_LIMIT: ${{ inputs.constraint_measure_debug_feature_probe_limit || '50' }}
      CONSTRAINT_MATERIAL_OVERLAP_DELTA_PCT: "1"
      CONSTRAINT_MATERIAL_DISTANCE_DELTA_M: "25"
      OPEN_LOCATION_SPINE_MAX_DOWNLOAD_BYTES: "90000000"
      OPEN_LOCATION_SPINE_MAX_FEATURES_PER_SOURCE: "2500"
      OPEN_LOCATION_SPINE_SITE_CONTEXT_BATCH_SIZE: "250"
      OPEN_LOCATION_SPINE_OSM_SITE_BATCH_SIZE: "10"
      OPEN_LOCATION_SPINE_OSM_CONTEXT_BATCH_SIZE: "25"
      OPEN_LOCATION_SPINE_OSM_ELEMENT_LIMIT: "2000"
      PHASE2_SOURCE_FAMILY: ${{ inputs.phase2_source_family || '' }}
      PHASE2_AUTHORITY: ${{ inputs.phase2_authority || '' }}
      PHASE2_BATCH_SIZE: ${{ inputs.phase2_batch_size || '250' }}
      PHASE2_RUNTIME_MINUTES: ${{ inputs.phase2_runtime_minutes || '10' }}
      PHASE2_DRY_RUN: ${{ inputs.phase2_dry_run || false }}
      PHASE2_FORCE_REFRESH: ${{ inputs.phase2_force_refresh || false }}
      PHASE2_AUDIT_ONLY: ${{ inputs.phase2_audit_only || false }}
      TITLE_RESOLUTION_MAX_CANDIDATES_PER_SITE: "10"
      TITLE_RESOLUTION_MIN_OVERLAP_SQM: "1"
      TITLE_RESOLUTION_PARCEL_TITLE_BATCH_SIZE: "0"
      TITLE_RESOLUTION_SITE_BATCH_SIZE: "500"
      SITE_PARCEL_LINK_MAX_CANDIDATES_PER_SITE: "10"
      SITE_PARCEL_LINK_MAX_DISTANCE_M: "250"
      SITE_PARCEL_LINK_MIN_OVERLAP_SQM: "1"
      SITE_PARCEL_LINK_SITE_BATCH_SIZE: "250"
      MIRROR_LAND_OBJECTS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Validate workflow configuration
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing GitHub secret: SUPABASE_DB_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          if [ -z "$BOUNDARY_AUTHKEY" ]; then
            echo "Missing GitHub secret: BOUNDARY_AUTHKEY"
            exit 1
          fi

      - name: Resolve selected command
        run: |
          set -euo pipefail
          selected_command="${{ inputs.command }}"
          if [ -z "$selected_command" ]; then
            selected_command="validate-only"
          fi
          echo "SELECTED_COMMAND=${selected_command}" >> "$GITHUB_ENV"
          case "$selected_command" in
            validate-only|run-migrations|sync-source-catalog|audit-source-footprint|audit-source-freshness|register-source-estate|probe-source-estate|audit-source-estate|process-reconcile-queue|reconcile-catchup-scan|refresh-affected-sites|weekly-reconcile-maintenance|discover-phase2-sources|ingest-planning-appeals|ingest-power-infrastructure|ingest-amenities|ingest-demographics|ingest-market-context|ingest-planning-documents|ingest-intelligence-events|audit-full-source-estate|refresh-planning-decisions|audit-planning-decisions|refresh-title-readiness|refresh-title-reviews|refresh-site-market-context|refresh-site-amenity-context|refresh-site-demographic-context|refresh-site-power-context|refresh-site-abnormal-risk|refresh-site-assessments|ingest-companies-house|ingest-fca-entities)
              system_package_profile="minimal"
              ;;
            *)
              system_package_profile="geospatial"
              ;;
          esac
          echo "SYSTEM_PACKAGE_PROFILE=${system_package_profile}" >> "$GITHUB_ENV"

      - name: Install system packages
        if: env.SYSTEM_PACKAGE_PROFILE == 'geospatial'
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev proj-bin postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run regression checks
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Compile critical runners
        run: python -m py_compile src/source_phase_runner.py src/source_catalog_sync.py src/source_reconcile_incremental.py src/source_reconcile_catchup.py src/source_reconcile_audit.py src/source_freshness_audit.py src/source_estate_registry.py src/source_policy_discovery.py src/source_expansion_runner.py src/source_expansion_runner_wfs_paging.py src/phase2_source_runner.py src/main.py

      - name: Show selected command
        run: |
          echo "Command: ${SELECTED_COMMAND}"
          echo "System package profile: ${SYSTEM_PACKAGE_PROFILE}"

      - name: Run source phase command
        run: |
          set -euo pipefail

          run_with_retries() {
            local max_attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            while true; do
              echo "Running: $* (attempt ${attempt}/${max_attempts})"
              set +e
              "$@"
              local status=$?
              set -e
              if [ "$status" -eq 0 ]; then
                return 0
              fi
              echo "Command exited with status ${status}"
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts"
                return 1
              fi
              echo "Command failed. Retrying in ${delay_seconds} seconds..."
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
            done
          }

          is_source_expansion_ingest() {
            case "$1" in
              resolve-title-numbers|ingest-ldp|ingest-settlement-boundaries|ingest-ela|ingest-vdl|ingest-sepa-flood|ingest-coal-authority|ingest-hes-designations|ingest-naturescot|ingest-contaminated-land|ingest-tpo|ingest-culverts|ingest-conservation-areas|ingest-greenbelt|ingest-os-topography|ingest-os-places|ingest-os-features|ingest-os-linked-identifiers|ingest-os-openmap-local|ingest-os-open-roads|ingest-os-open-rivers|ingest-os-boundary-line|ingest-os-open-names|ingest-os-open-greenspace|ingest-os-open-zoomstack|ingest-os-open-toid|ingest-os-open-built-up-areas|ingest-os-open-uprn|ingest-os-open-usrn|ingest-osm-overpass|ingest-open-location-spine|ingest-naptan|ingest-statistics-gov-scot|ingest-opentopography-srtm|probe-open-location-spine)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_phase2_command() {
            case "$1" in
              discover-phase2-sources|ingest-planning-appeals|ingest-power-infrastructure|ingest-amenities|ingest-demographics|ingest-market-context|ingest-planning-documents|ingest-intelligence-events|ingest-companies-house|ingest-fca-entities|refresh-title-reviews|refresh-planning-decisions|audit-planning-decisions|refresh-title-readiness|refresh-site-market-context|refresh-site-amenity-context|refresh-site-demographic-context|refresh-site-power-context|refresh-site-abnormal-risk|refresh-site-assessments|audit-full-source-estate)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          if [ "$SELECTED_COMMAND" = "sync-source-catalog" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_catalog_sync sync-source-catalog
          elif [ "$SELECTED_COMMAND" = "validate-only" ]; then
            echo "Push validation only. No Supabase write command selected."
          elif [ "$SELECTED_COMMAND" = "run-migrations" ]; then
            python -m src.source_phase_runner run-migrations
          elif [ "$SELECTED_COMMAND" = "audit-source-footprint" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_audit audit-source-footprint
          elif [ "$SELECTED_COMMAND" = "audit-source-freshness" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_freshness_audit audit-source-freshness
          elif [ "$SELECTED_COMMAND" = "audit-source-expansion" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_expansion_runner_wfs_paging audit-source-expansion
          elif [ "$SELECTED_COMMAND" = "ingest-ros-cadastral" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.main ingest-ros-cadastral
            python -m src.source_expansion_runner_wfs_paging audit-title-number-control
          elif [ "$SELECTED_COMMAND" = "link-sites-to-ros-parcels" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.source_expansion_runner_wfs_paging link-sites-to-ros-parcels
            python -m src.source_expansion_runner_wfs_paging audit-site-parcel-links
          elif [ "$SELECTED_COMMAND" = "audit-site-parcel-links" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_expansion_runner_wfs_paging audit-site-parcel-links
          elif [ "$SELECTED_COMMAND" = "resolve-title-numbers" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.source_expansion_runner_wfs_paging resolve-title-numbers
            python -m src.source_expansion_runner_wfs_paging audit-title-number-control
          elif [ "$SELECTED_COMMAND" = "source-estate-maintenance" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            python -m src.source_estate_registry probe-source-estate
            python -m src.source_policy_discovery discover-ldp-geonetwork
            python -m src.source_policy_discovery register-settlement-boundaries
            python -m src.source_expansion_runner_wfs_paging link-sites-to-ros-parcels
            python -m src.source_expansion_runner_wfs_paging audit-site-parcel-links
            python -m src.source_expansion_runner_wfs_paging resolve-title-numbers
            python -m src.source_expansion_runner_wfs_paging audit-title-number-control
            python -m src.source_estate_registry audit-source-estate
            python -m src.source_freshness_audit audit-source-freshness
            python -m src.source_expansion_runner_wfs_paging audit-source-expansion
          elif [ "$SELECTED_COMMAND" = "register-source-estate" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
          elif [ "$SELECTED_COMMAND" = "probe-source-estate" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry probe-source-estate
          elif [ "$SELECTED_COMMAND" = "audit-source-estate" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry audit-source-estate
          elif [ "$SELECTED_COMMAND" = "audit-title-number-control" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_expansion_runner_wfs_paging audit-title-number-control
          elif [ "$SELECTED_COMMAND" = "measure-constraints" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.source_expansion_runner_wfs_paging measure-constraints
            python -m src.source_expansion_runner_wfs_paging audit-constraint-measurements
          elif [ "$SELECTED_COMMAND" = "measure-constraints-debug-all-layers" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.source_expansion_runner_wfs_paging measure-constraints-debug-all-layers
            python -m src.source_expansion_runner_wfs_paging audit-constraint-measurements
          elif [ "$SELECTED_COMMAND" = "audit-constraint-measurements" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_expansion_runner_wfs_paging audit-constraint-measurements
          elif is_phase2_command "$SELECTED_COMMAND"; then
            python -m src.source_phase_runner run-migrations
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.phase2_source_runner "$SELECTED_COMMAND"
            if [ "$SELECTED_COMMAND" != "audit-full-source-estate" ]; then
              python -m src.phase2_source_runner audit-full-source-estate
            fi
          elif [ "$SELECTED_COMMAND" = "discover-ldp-sources" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            python -m src.source_policy_discovery discover-ldp-geonetwork
          elif [ "$SELECTED_COMMAND" = "discover-settlement-sources" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            python -m src.source_policy_discovery register-settlement-boundaries
          elif is_source_expansion_ingest "$SELECTED_COMMAND"; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_estate_registry register-source-estate
            python -m src.source_policy_discovery register-supplemental-sources
            run_with_retries 1 30 timeout "$SOURCE_EXPANSION_COMMAND_TIMEOUT" python -m src.source_expansion_runner_wfs_paging "$SELECTED_COMMAND"
            python -m src.source_expansion_runner_wfs_paging audit-source-expansion
          elif [ "$SELECTED_COMMAND" = "process-reconcile-queue" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental process-reconcile-queue --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
          elif [ "$SELECTED_COMMAND" = "reconcile-catchup-scan" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_catchup reconcile-catchup-scan --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}" --batch-limit "${PHASE2_BATCH_SIZE:-250}"
          elif [ "$SELECTED_COMMAND" = "refresh-affected-sites" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental refresh-affected-sites --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
          elif [ "$SELECTED_COMMAND" = "weekly-reconcile-maintenance" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_reconcile_incremental weekly-reconcile-maintenance
          elif [ "$SELECTED_COMMAND" = "full-reconcile-canonical-sites" ]; then
            echo "full-reconcile-canonical-sites is retired for Phase One burn-in. Use process-reconcile-queue and refresh-affected-sites."
            exit 1
          elif [ "$SELECTED_COMMAND" = "publish-planning-links" ]; then
            python -m src.source_phase_runner run-migrations
            echo "Publishing existing planning records into the canonical-site reconcile queue with bounded runtime and batch controls. No full SpatialHub planning pull is being run."
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family planning --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}" --batch-limit "${PHASE2_BATCH_SIZE:-250}"
            python -m src.source_reconcile_incremental process-reconcile-queue --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
            python -m src.source_reconcile_incremental refresh-affected-sites --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
          elif [ "$SELECTED_COMMAND" = "ingest-planning-history" ]; then
            python -m src.source_phase_runner run-migrations
            echo "Planning applications are already populated. Skipping full SpatialHub planning ingest and publishing existing records instead."
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family planning --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}" --batch-limit "${PHASE2_BATCH_SIZE:-250}"
            python -m src.source_reconcile_incremental process-reconcile-queue --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
            python -m src.source_reconcile_incremental refresh-affected-sites --limit "${PHASE2_BATCH_SIZE:-250}" --runtime-minutes "${PHASE2_RUNTIME_MINUTES:-10}"
          elif [ "$SELECTED_COMMAND" = "full-ingest-planning-history" ]; then
            python -m src.source_phase_runner run-migrations
            echo "Full SpatialHub planning ingest explicitly requested. This is the only planning command allowed to run the long WFS pull."
            python -m src.source_phase_runner ingest-planning-history
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family planning
            python -m src.source_reconcile_incremental process-reconcile-queue --limit 50000
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "ingest-hla" ]; then
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner ingest-hla
            python -m src.source_reconcile_catchup reconcile-catchup-scan --source-family hla
            python -m src.source_reconcile_incremental process-reconcile-queue --limit 50000
            python -m src.source_reconcile_incremental refresh-affected-sites --limit 10000
          elif [ "$SELECTED_COMMAND" = "ingest-bgs" ]; then
            python -m src.source_phase_runner run-migrations
            run_with_retries 3 30 python -m src.source_phase_runner ingest-bgs
          elif [ "$SELECTED_COMMAND" = "full-refresh-core-sources" ]; then
            echo "full-refresh-core-sources is disabled during incremental source burn-in because it would run the full planning WFS ingest. Run source-estate-maintenance, source expansion commands, publish-planning-links, ingest-hla, and ingest-bgs as separate controlled commands."
            exit 1
          else
            python -m src.source_phase_runner run-migrations
            python -m src.source_phase_runner "$SELECTED_COMMAND"
          fi
