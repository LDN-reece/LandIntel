  - source_key: planning_decision_engine
    module_key: planning_decisions
    source_family: planning_decisions
    source_name: Planning decision and event engine
    source_group: planning_intelligence
    geography: Scotland
    access_status: access_confirmed
    ingest_status: source_registered
    normalisation_status: source_registered
    site_link_status: source_registered
    measurement_status: source_registered
    evidence_status: source_registered
    signal_status: source_registered
    assessment_status: source_registered
