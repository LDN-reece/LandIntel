spatial_hub:
  package_show_base_url: https://data.spatialhub.scot/api/3/action/package_show?id=
  authkey_env: BOUNDARY_AUTHKEY
  sources:
    planning_history:
      source_name: "Planning Applications: Official - Scotland"
      publisher: Improvement Service
      dataset_id: planning_applications_official-is
      metadata_uuid: spatialhub:planning_applications_official-is
      resource_name_contains: Polygons
      authority_field_candidates:
        - local_auth
        - local_authority
        - authority_name
      field_mappings:
        source_record:
          - reference
          - application_reference
          - app_reference
          - planning_ref
          - objectid
        planning_reference:
          - reference
          - application_reference
          - app_reference
          - planning_ref
        application_type:
          - application_type
          - app_type
          - development_type
          - category
        proposal_text:
          - proposal
          - proposal_text
          - description
          - development_description
        application_status:
          - status
          - application_status
          - state
        decision:
          - decision
          - decision_status
          - final_decision
        lodged_date:
          - lodged_date
          - valid_date
          - received_date
          - application_date
        decision_date:
          - decision_date
          - decided_date
          - final_decision_date
        appeal_status:
          - appeal_status
          - appeal
          - appeal_decision
        refusal_reason_text:
          - refusal_reason
          - refusal_reasons
          - decision_comment
          - comments
    hla:
      source_name: "Housing Land Supply - Scotland"
      publisher: Improvement Service
      dataset_id: housing_land_supply-is
      metadata_uuid: spatialhub:housing_land_supply-is
      authority_field_candidates:
        - local_auth
        - local_authority
        - authority_name
      field_mappings:
        source_record:
          - site_reference
          - site_ref
          - site_code
          - reference
          - key_name
          - objectid
        site_reference:
          - site_reference
          - site_ref
          - site_code
          - reference
          - key_name
        site_name:
          - site_name
          - name
          - site
        effectiveness_status:
          - effectiveness_status
          - effectiveness
          - effective_status
          - effective
        programming_horizon:
          - programming_horizon
          - programming
          - horizon
          - phase
        constraint_reasons:
          - constraint_reasons
          - constraints
          - constraint_reason
          - main_constraint
        developer_name:
          - developer_name
          - developer
          - builder
        remaining_capacity:
          - remaining_capacity
          - remain_capacity
          - remaining
        completions:
          - completions
          - completion_total
          - completed_units
        tenure:
          - tenure
          - site_tenure
        brownfield_indicator:
          - brownfield_indicator
          - brownfield
          - previously_developed_land
bgs:
  base_url: https://ogcapi.bgs.ac.uk
  collections:
    boreholes:
      source_name: BGS Borehole Records
      metadata_uuid: bgs:onshoreboreholeindex
      collection_id: onshoreboreholeindex
      record_type: borehole_records_within_500m
      bbox_buffer_m: 500
    site_investigations:
      source_name: BGS AGS Borehole Records
      metadata_uuid: bgs:agsboreholeindex
      collection_id: agsboreholeindex
      record_type: ags_site_investigation_records_within_250m
      bbox_buffer_m: 250
    mine_plans:
      source_name: BGS Mine Plans
      metadata_uuid: bgs:mine_plans
      collection_id: mine_plans
      record_type: mine_plan_records_on_or_near_site
      bbox_buffer_m: 0
